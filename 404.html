<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Page Not Found — Squids</title>
  <meta name="robots" content="noindex"/>
  <link rel="icon" type="image/svg+xml" href="/images/logo.svg"/>
  <link rel="stylesheet" href="/css/main.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>body{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}</style>
</head>
<body>
<div class="ambient"><div class="orb orb-1"></div></div>
<div style="position:relative;z-index:2;">
  <img src="/images/logo.svg" alt="Squids" width="64" height="64" style="margin:0 auto 24px"/>
  <h1 style="font-family:var(--font-d);font-size:clamp(60px,10vw,120px);font-weight:900;color:var(--teal);line-height:1;margin-bottom:16px;">404</h1>
  <p style="font-size:20px;color:var(--text2);margin-bottom:8px;font-family:var(--font-d);font-weight:700;">Page not found</p>
  <p style="font-size:15px;color:var(--text3);margin-bottom:40px;">The page you're looking for doesn't exist or has moved.</p>
  <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;">
    <a href="/" class="btn btn-primary btn-lg" style="display:inline-flex;align-items:center;gap:8px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Go Home
    </a>
    <a href="https://app.squids.co.za" target="_blank" rel="noopener" class="btn btn-ghost btn-lg" style="display:inline-flex;align-items:center;gap:8px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      Open Squids
    </a>
  </div>
</div>
</body>
</html>
